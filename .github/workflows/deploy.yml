name: Deploy Application

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - stage

jobs:
  production:
    name: Deploy Application to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://randallwilk.dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Authenticate with 1Password
        uses: 1password/load-secrets-action/configure@v2
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Inject secrets into environment
        run: |
          APP_ENV=production op inject -i .env.template -o .env --force

      - name: Setup SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
          name: id_deploy

      - name: Transfer .env to server
        run: |
          # Configure identity file
          eval $(ssh-agent)
          ssh-add ~/.ssh/id_deploy

          # Transfer environment file
          # -L to preserve symlinks on target
          rsync -apL \
          .env \
          ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:${{ secrets.REMOTE_TARGET }}/.env

      - name: Deploy
        uses: jbrooksuk/laravel-forge-action@v1.0.4
        with:
          trigger_url: ${{ secrets.FORGE_TRIGGER_URL }}

      - name: Cleanup
        run: |
          rm .env

  staging:
    name: Deploy Application to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/stage'
    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Authenticate with 1Password
        uses: 1password/load-secrets-action/configure@v2
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Inject secrets into environment
        run: |
          APP_ENV=staging op inject -i .env.template -o .env --force

      - name: Setup SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
          name: id_deploy

      - name: Transfer .env to server
        run: |
          # Configure identity file
          eval $(ssh-agent)
          ssh-add ~/.ssh/id_deploy

          # Transfer environment file
          # -L to preserve symlinks on target
          rsync -apL \
          .env \
          ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:${{ secrets.REMOTE_TARGET }}/.env

      - name: Deploy
        uses: jbrooksuk/laravel-forge-action@v1.0.4
        with:
          trigger_url: ${{ secrets.FORGE_TRIGGER_URL }}

      - name: Cleanup
        run: |
          rm .env
